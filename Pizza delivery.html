<!DOCTYPE html>
<html>
    <head>
<style>
    body {
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        background: rgb(245, 6, 6);
        text-align: center;
        padding: 30px;
    }
    h1 {
        color: aquamarine;
    }
    button {
        background: aqua;
        color: bisque;
        padding: 10px 25px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        margin: 5px;
    }
    div{
        border: 1px solid blue;
        width: 280px;
        margin: 6px auto;
        padding: 8px 12px;
        text-align: left;
        border-radius: 6px;
    }
</style>
    </head>
    <body>
        <h1>My Delivery Tracker</h1>
        <button onclick="saveOrder()">Save Order</button>
        <button onclick="startDelivery()">Start Delivery</button>

        <div>JSON Text: <span id="json-text"></span></div>
        <div>Loaded Item: <span id="loaded-item"></span></div>
        <div>Loaded Price: <span id="loaded-price"></span></div>
        <div>Status: <span id="status"></span></div>
        <div>Result: <span id="result"></span></div>

        <script>
            let order = {
                item: "Pizza",
                price: 4,
                shop: "My Izza shop"

            };

            function saveOrder(){
                let jsonText = JSON.stringify(order);
                let loadedOrder = JSON.parse(jsonText);

                document.getElementById("json-text").innerHTML = jsonText;
                  document.getElementById("loaded-item").innerHTML = loadedOrder;
                    document.getElementById("loaded-price").innerHTML = "$" + loadedOrder.price;
            }
            
            function delay(ms){
                return new Promise(function(resolve){
                    setTimeout(resolve, ms);
                });
            }

            async function startDelivery(){
                document.getElementById("result").innerHTML = "";

                document.getElementById("status").innerHTML ="Order received!",
                setTimeout(function() {
                    document.getElementById("status").innerHTML = "Kitchen is perparing...";
            },1000);

            await delay (3000);
            document.getElementById("status").innerHTML = "Out for delivery!";
        
        await delay(2000);
                document.getElementById("result").innerHTML = "Your order has arrived!";
        }
        </script>
    </body>
</html>
