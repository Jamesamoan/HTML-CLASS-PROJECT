<!DOCTYPE html>
<html>
    <head>
        <title>CCS Example</title>
        <style>
            /* Element Selector*/
            h1{color: blue;background-color: rgb(33, 100, 0);}
            /*Unversal Selector*/
           * {font-family: Verdana, Geneva, Tahoma, sans-serif;}
           /* Gruop Selector*/
           h3p{color: rgb(218, 255, 205);}
           /*Class Selector*/
           .cat{margin-left: 20px;
            color: darkslateblue;
            font-size: x-large;
            background-color: bisque;}
           /*ID Selector*/
           #demo{margin-left: 56;
        color: aqua;
    background-color: azure;
width: 67;}
        </style>
    </head>
    <body>
        <h1 style="color: blue;background-color: rgb(95, 165, 42);">Heading 1</h1>
        <h1>Heading 2</h1>
        <h1>Heading 3</h1>
        <h3 id="demo">Another Heading</h3>
        <p>this is an example of a ID Selector</p>
        <h3 class="cat">Another Heading</h3>
        <p>this is an example of a ID Selector</p>
    </body>
</html>
